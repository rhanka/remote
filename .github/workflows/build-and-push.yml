name: Build and push images

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: control-plane
            dockerfile: apps/control-plane/Dockerfile
            image: ghcr.io/rhanka/sentropic-remote-control-plane
          - name: session-agent
            dockerfile: packages/session-agent/Dockerfile
            image: ghcr.io/rhanka/sentropic-remote-session-agent
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          REF="${GITHUB_REF##*/}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tags=${{ matrix.image }}:${REF},${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA::7}"
            echo "tags=${{ matrix.image }}:main,${{ matrix.image }}:${SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # NOTE: GHCR packages default to private on first push under a user
          # account; GITHUB_TOKEN cannot flip the visibility (PATCH endpoint is
          # /user/packages/... and requires an admin:packages PAT). One-time
          # manual action by the repo owner via
          # https://github.com/users/rhanka/packages/container/<name>/settings
          # → Change visibility → Public. Tracked in poc-k8s/requests/.
