apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: sentropic-remote
  labels:
    app.kubernetes.io/name: sentropic-remote
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentropic-remote
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentropic-remote
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: sentropic-remote-control-plane
      containers:
        - name: control-plane
          image: ghcr.io/rhanka/sentropic-remote-control-plane:main
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Default = fat image (full dev box: Go, Rust, build-essential,
            # python3). A :main-slim variant exists (same CLIs/tools, no
            # language toolchains) for faster cold pulls — switch the tag to
            # ghcr.io/rhanka/sentropic-remote-session-agent:main-slim if the
            # sessions never compile anything.
            - name: SESSION_AGENT_IMAGE
              value: "ghcr.io/rhanka/sentropic-remote-session-agent:main"
            - name: SESSION_STORAGE_CLASS
              value: "matchid-rwx"
            - name: SESSION_STORAGE_ACCESS_MODE
              value: "ReadWriteMany"
            - name: SESSION_WORKSPACE_SIZE
              value: "100G"
            - name: SESSION_NODE_SELECTOR
              value: "k8s.scaleway.com/pool-name=burst-rwx"
            # ONE shared RWX volume for ALL workspaces (subPath per workspace):
            # Scaleway File Storage is min 100G/volume and the filestorage CSI
            # allows a single attachment per node — per-workspace PVCs both
            # wasted ~100G each AND pinned one session per node.
            - name: SESSION_SHARED_WORKSPACE_PVC
              value: "remote-workspaces"
            # WP16 Slice 3: route all session pods through the pooled LLM
            # gateway (personal-passthrough v0 — token injected per-session).
            - name: LLM_GATEWAY_URL
              value: "https://llm.sent-tech.ca"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sentropic-remote-control-plane
  namespace: sentropic-remote
  labels:
    app.kubernetes.io/name: sentropic-remote
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentropic-remote
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: http
