# Secret exemple — à adapter avec vos vrais tokens.
# Créer via :
#   remote account push-cluster  (commande à livrer en Slice 2b)
# Ou manuellement :
#   kubectl -n sentropic-remote create secret generic llm-gateway-accounts \
#     --from-literal=accounts.json='[{"id":"c1","provider":"claude-code","label":"Claude A","token":"sk-ant-..."}]' \
#     --dry-run=client -o yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-accounts
  namespace: sentropic-remote
type: Opaque
stringData:
  accounts.json: |
    [
      {
        "id": "c1",
        "provider": "claude-code",
        "label": "Claude principal",
        "token": "sk-ant-REPLACE_ME",
        "expiresAt": "2026-07-23T00:00:00Z"
      },
      {
        "id": "codex1",
        "provider": "codex",
        "label": "Codex o3",
        "token": "OPENAI_API_KEY_REPLACE_ME"
      }
    ]
