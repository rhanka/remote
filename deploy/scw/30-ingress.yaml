# Optional Ingress exposing the control-plane to the internet via the
# Kapsule-provisioned Traefik. Replace HOST with your own DNS record before
# applying. SSL is delegated to cert-manager + Let's Encrypt; install
# cert-manager + a ClusterIssuer named "letsencrypt" beforehand or remove the
# tls section to expose plain HTTP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentropic-remote-control-plane
  namespace: sentropic-remote
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["remote.sentropic.dev"]
      secretName: sentropic-remote-control-plane-tls
  rules:
    - host: remote.sentropic.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentropic-remote-control-plane
                port:
                  name: http
