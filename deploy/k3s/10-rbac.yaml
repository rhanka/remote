apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentropic-remote-control-plane
  namespace: sentropic-remote
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sentropic-remote-control-plane
  namespace: sentropic-remote
rules:
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims", "services", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sentropic-remote-control-plane
  namespace: sentropic-remote
subjects:
  - kind: ServiceAccount
    name: sentropic-remote-control-plane
    namespace: sentropic-remote
roleRef:
  kind: Role
  name: sentropic-remote-control-plane
  apiGroup: rbac.authorization.k8s.io
