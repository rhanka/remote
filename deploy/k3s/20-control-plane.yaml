apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: sentropic-remote
  labels:
    app.kubernetes.io/name: sentropic-remote
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentropic-remote
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentropic-remote
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: sentropic-remote-control-plane
      containers:
        - name: control-plane
          image: ghcr.io/rhanka/sentropic-remote-control-plane:v0.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SESSION_AGENT_IMAGE
              value: "ghcr.io/rhanka/sentropic-remote-session-agent:v0.4.0"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sentropic-remote-control-plane
  namespace: sentropic-remote
  labels:
    app.kubernetes.io/name: sentropic-remote
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentropic-remote
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: http
